log_format aftercare_story 'FRONTEND | $remote_addr | $request_method $uri | '
                           'status=$status | upstream=$upstream_status | '
                           'request_time=$request_time upstream_time=$upstream_response_time';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log aftercare_story;

    # Allow local test image uploads. The generated Aster Pump PNG samples are
    # around 1.6 MB, while Nginx defaults to 1 MB and returns HTTP 413.
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # The browser calls /api/*; Nginx forwards those requests to the backend
    # container when both services are on the same Docker Compose network.
    location /api/ {
        proxy_pass http://aster-pump-aftercare-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page-app fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
