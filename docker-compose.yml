name: aster-pump

services:
  aster-pump-aftercare-model:
    image: aster-pump-aftercare-model:local
    container_name: aster-pump-aftercare-model
    restart: unless-stopped
    environment:
      OLLAMA_MODEL: qwen3:1.7b
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - aster-pump-aftercare-ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-backend:
    image: aster-pump-aftercare-backend:local
    container_name: aster-pump-aftercare-backend
    restart: unless-stopped
    environment:
      MODEL_BASE_URL: http://aster-pump-aftercare-model:11434
      MODEL_NAME: qwen3:1.7b
      REQUEST_TIMEOUT_SECONDS: "300"
      QDRANT_URL: http://aster-pump-aftercare-vectordb:6333
      MCP_SERVER_URL: http://aster-pump-aftercare-mcp-server:8200
    ports:
      - "8000:8000"
    depends_on:
      aster-pump-aftercare-model:
        condition: service_healthy
      aster-pump-aftercare-vectordb:
        condition: service_started
      aster-pump-aftercare-mcp-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-vectordb:
    image: aster-pump-aftercare-vectordb:local
    container_name: aster-pump-aftercare-vectordb
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - aster-pump-aftercare-qdrant:/qdrant/storage
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-db:
    image: aster-pump-aftercare-db:local
    container_name: aster-pump-aftercare-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aster_pump_aftercare
      POSTGRES_USER: aftercare
      POSTGRES_PASSWORD: aftercare
    ports:
      - "5432:5432"
    volumes:
      - aster-pump-aftercare-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aftercare -d aster_pump_aftercare"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-image-ai-service:
    image: aster-pump-aftercare-image-ai-service:local
    container_name: aster-pump-aftercare-image-ai-service
    restart: unless-stopped
    ports:
      - "8100:8100"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-mcp-server:
    image: aster-pump-aftercare-mcp-server:local
    container_name: aster-pump-aftercare-mcp-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aftercare:aftercare@aster-pump-aftercare-db:5432/aster_pump_aftercare
      IMAGE_AI_URL: http://aster-pump-aftercare-image-ai-service:8100
    ports:
      - "8200:8200"
    depends_on:
      aster-pump-aftercare-db:
        condition: service_healthy
      aster-pump-aftercare-image-ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/health', timeout=5)",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - aster-pump-aftercare-net

  aster-pump-aftercare-frontend:
    image: aster-pump-aftercare-frontend:local
    container_name: aster-pump-aftercare-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      aster-pump-aftercare-backend:
        condition: service_healthy
    networks:
      - aster-pump-aftercare-net

networks:
  aster-pump-aftercare-net:
    name: aster-pump-aftercare-net

volumes:
  aster-pump-aftercare-ollama:
    external: true
    name: aster-pump-aftercare-ollama
  aster-pump-aftercare-qdrant:
    external: true
    name: aster-pump-aftercare-qdrant
  aster-pump-aftercare-postgres:
    external: true
    name: aster-pump-aftercare-postgres
