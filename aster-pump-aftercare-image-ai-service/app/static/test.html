<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aster Pump Image Analyzer Test</title>
    <style>
      :root {
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        background: #ffffff;
        border: 1px solid #d9e3ed;
        border-radius: 8px;
        box-shadow: 0 18px 36px rgba(21, 37, 55, 0.08);
        display: grid;
        gap: 18px;
        max-width: 680px;
        padding: 24px;
        width: 100%;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: #5f6f85;
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        color: #42526a;
        display: grid;
        font-weight: 800;
        gap: 8px;
      }

      input {
        border: 1px solid #cbd8e6;
        border-radius: 8px;
        padding: 12px;
      }

      button {
        align-items: center;
        background: #145c6d;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 800;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      pre {
        background: #f7f9fb;
        border: 1px solid #dce6ef;
        border-radius: 8px;
        min-height: 120px;
        margin: 0;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aster Pump Image Analyzer Test</h1>
      <p>
        Upload a sample image or text file. The service will return detected labels
        such as <strong>AsterPump X17</strong>, <strong>E-41</strong>,
        <strong>E-77</strong>, or <strong>E-93</strong>.
      </p>

      <form id="analyze-form">
        <label>
          Test file
          <input id="file-input" name="file" type="file" accept="image/*,.txt" required />
        </label>
        <button id="submit-button" type="submit">Analyze image</button>
      </form>

      <pre id="result">Waiting for upload...</pre>
    </main>

    <script>
      const form = document.getElementById("analyze-form");
      const fileInput = document.getElementById("file-input");
      const result = document.getElementById("result");
      const submitButton = document.getElementById("submit-button");
      const analyzerUrl =
        window.location.protocol === "file:"
          ? "http://localhost:8100/analyze-image"
          : `${window.location.origin}/analyze-image`;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        if (!fileInput.files || fileInput.files.length === 0) {
          result.textContent = "Please choose a file first.";
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        submitButton.disabled = true;
        result.textContent = "Analyzing...";

        try {
          const response = await fetch(analyzerUrl, {
            method: "POST",
            body: formData,
          });

          const responseText = await response.text();
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${responseText}`);
          }

          result.textContent = JSON.stringify(JSON.parse(responseText), null, 2);
        } catch (error) {
          result.textContent = error instanceof Error ? error.message : "Unknown error";
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
